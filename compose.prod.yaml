name: nexussuite

x-app: &app
  image: ${BACKEND_IMAGE:-nexussuite-backend:local}
  env_file: [.env]
  restart: unless-stopped
  init: true

services:
  api:
    <<: *app
    build:
      context: .
      target: runtime
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - resume-exports:/data/resume_exports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/live', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s

  worker:
    <<: *app
    command: ["celery", "-A", "app.worker.celery_app", "worker", "-Q", "webhooks,embeddings,default", "--loglevel=info"]
    stop_grace_period: 1m
    volumes:
      - resume-exports:/data/resume_exports

  beat:
    <<: *app
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=info", "--schedule=/data/celery/celerybeat-schedule"]
    volumes:
      - celery-state:/data/celery

  migrate:
    <<: *app
    profiles: [release]
    restart: "no"
    command: ["alembic", "upgrade", "head"]

volumes:
  resume-exports:
  celery-state:
