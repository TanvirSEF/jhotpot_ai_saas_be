name: Backend CI

on:
  workflow_call:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime and CI tools
        run: |
          pip install -r requirements.txt
          pip install ruff==0.15.22 mypy==2.3.0 bandit==1.9.4 pip-audit==2.10.1
      - name: Lint
        run: ruff check app tests --target-version py312 --line-length 100 --select E4,E7,E9,F,I,B,ASYNC --ignore B008
      - name: Type check
        run: mypy app --python-version 3.12 --check-untyped-defs --warn-redundant-casts --warn-unused-ignores --no-implicit-optional --ignore-missing-imports
      - name: Security static analysis
        run: bandit -r app -q -x tests,migrations -s B101,B105,B106,B311
      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.txt --cache-dir .cache/pip-audit --progress-spinner off
      - name: Unit and contract tests
        run: python -m unittest discover -s tests -v

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: docker compose -f compose.test.yaml up -d --wait
      - name: Migration, PostgreSQL, and Redis integration tests
        env:
          RUN_DATABASE_INTEGRATION_TESTS: "1"
          TEST_DATABASE_URL: postgresql+asyncpg://nexussuite:nexussuite_test_password@127.0.0.1:55432/nexussuite_test
          RUN_REDIS_INTEGRATION_TESTS: "1"
          TEST_REDIS_URL: redis://127.0.0.1:56379/15
        run: python -m unittest discover -s tests/integration -v
      - if: failure()
        run: docker compose -f compose.test.yaml logs
      - if: always()
        run: docker compose -f compose.test.yaml down --volumes

  image:
    needs: [quality, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: nexussuite-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify runtime, PDF engine, and non-root user
        run: |
          test "$(docker inspect --format '{{.Config.User}}' nexussuite-backend:ci)" = "app"
          docker run --rm --entrypoint python nexussuite-backend:ci -c "import app.main; import weasyprint; print(weasyprint.__version__)"
