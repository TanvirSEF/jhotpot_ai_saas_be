name: Backend integration

on:
  pull_request:
  push:
    branches: [main]

jobs:
  database-and-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start disposable PostgreSQL with pgvector
        run: docker compose -f compose.test.yaml up -d --wait

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run migration lifecycle and drift checks
        env:
          RUN_DATABASE_INTEGRATION_TESTS: "1"
          TEST_DATABASE_URL: postgresql+asyncpg://nexussuite:nexussuite_test_password@127.0.0.1:55432/nexussuite_test
          RUN_REDIS_INTEGRATION_TESTS: "1"
          TEST_REDIS_URL: redis://127.0.0.1:56379/15
        run: python -m unittest discover -s tests/integration -v

      - name: Show database logs after failure
        if: failure()
        run: docker compose -f compose.test.yaml logs postgres-test

      - name: Stop disposable services
        if: always()
        run: docker compose -f compose.test.yaml down --volumes
